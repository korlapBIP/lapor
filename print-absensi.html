<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Print Absensi BIP</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#fff;color:#172033;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif}
    body{padding:10px}
    .print-actions{display:flex;gap:10px;justify-content:center;margin:10px 0 14px}
    .btn{border:0;border-radius:12px;padding:10px 16px;font-weight:900;cursor:pointer}
    .primary{background:#2558d9;color:#fff}
    .secondary{background:#f4f7fb;color:#42526c;border:1px solid #d9e3f1}
    .sheet{width:100%;max-width:197mm;margin:0 auto;background:#fff}
    .print-title{text-align:center;line-height:1.08;padding:0 0 4px}
    .print-title .main{font-weight:900;text-transform:uppercase;font-size:16px}
    .print-title .company,.print-title .date{text-transform:uppercase;font-size:16px}
    .table-wrap{width:100%;overflow:visible;display:block}
    .report-table{width:100%;max-width:100%;margin:0 auto;border-collapse:collapse;table-layout:fixed;font-size:16px}
    .report-table th,.report-table td{border:1px solid #111;padding:1.6px 2.4px;text-align:center;white-space:normal;word-break:break-word;line-height:1}
    .report-table th{font-weight:900;background:#fff}
    .report-table td.name{text-align:left;min-width:0}
    .report-table th:nth-child(1),.report-table td:nth-child(1){width:24px}
    .report-table th:nth-child(2),.report-table td:nth-child(2){width:42px}
    .report-table th:nth-child(3),.report-table td:nth-child(3){width:130px}
    .report-table th:nth-child(4),.report-table td:nth-child(4),
    .report-table th:nth-child(5),.report-table td:nth-child(5){width:46px}
    .report-table th:nth-child(6),.report-table td:nth-child(6),
    .report-table th:nth-child(7),.report-table td:nth-child(7){width:54px}
    .tick{color:#15803d;font-weight:950;font-size:13.33px;line-height:1}
    .check-text{font-size:13.33px;line-height:1}
    .report-table tfoot.report-summary th,
    .report-table tfoot.report-summary td{border:1px solid #111;text-align:center;font-weight:900;background:#fff;font-size:13.33px;padding:1.6px 2.4px;line-height:1}
    .report-table tfoot.report-summary .left-label{text-align:center;font-weight:950}
    .report-table tfoot.report-summary .total{font-weight:950;font-size:13.33px}
    .report-table tfoot.report-summary .summary-empty{border:0!important;background:transparent!important}
    .report-footer{font-size:14.67px;margin:0 auto;max-width:100%}
    .signature-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center;margin:78px 0 4px}
    .signature-title{font-size:14.67px;font-weight:950;min-height:14px;line-height:1.05}
    .signature-line{border-bottom:1px solid #111;margin:62px auto 0;width:76%}
    .note-area{margin-top:4px;display:block;overflow:visible;break-inside:avoid;page-break-inside:avoid}
    .note-title{font-weight:950;margin:0 0 6px;line-height:1}
    .note-content{display:block;min-height:0;height:auto;margin:0 0 4px;padding:0;border:0;outline:0;overflow:visible}
    .worktime-table{border-collapse:collapse;width:245px;max-width:100%;font-size:10.67px;margin-top:4px;margin-bottom:0;display:table;break-inside:avoid;page-break-inside:avoid}
    .worktime-table th,.worktime-table td{border:1px solid #111;padding:2px 2.5px;text-align:center;font-size:10.67px;line-height:1.02;break-inside:avoid;page-break-inside:avoid}
    .worktime-table .worktime-main{font-weight:950;text-transform:uppercase}
    .empty-message{max-width:760px;margin:40px auto;padding:18px;border:1px solid #d9e3f1;border-radius:16px;background:#f8fafc;text-align:center;font-weight:800;color:#42526c}
    @page{size:215mm 330mm;margin:6mm 7mm 6mm 7mm}
    @media print{
      body{padding:0}
      .no-print{display:none!important}
      .sheet{width:100%;max-width:197mm;margin:0 auto}
    }

    /* UPDATE 32 - STYLE PRINT ABSENSI */
    .report-table thead th{
      background:#eeeeee!important;
      font-weight:400!important;
    }
    .print-title .main,
    .report-table th,
    .report-table td,
    .report-table tfoot.report-summary th,
    .report-table tfoot.report-summary td,
    .report-table tfoot.report-summary .left-label,
    .report-table tfoot.report-summary .total,
    .report-footer,
    .signature-title,
    .note-title,
    .worktime-table .worktime-main,
    .worktime-table th,
    .worktime-table td{
      font-weight:400!important;
    }
    .signature-grid{
      margin-top:24px!important;
    }
    .signature-line{
      margin-top:86px!important;
    }
    @media print{
      .report-table thead th{
        background:#eeeeee!important;
        font-weight:400!important;
      }
      .print-title .main,
      .report-table th,
      .report-table td,
      .report-table tfoot.report-summary th,
      .report-table tfoot.report-summary td,
      .report-table tfoot.report-summary .left-label,
      .report-table tfoot.report-summary .total,
      .report-footer,
      .signature-title,
      .note-title,
      .worktime-table .worktime-main,
      .worktime-table th,
      .worktime-table td{
        font-weight:400!important;
      }
      .signature-grid{
        margin-top:24px!important;
      }
      .signature-line{
        margin-top:86px!important;
      }
    }

  </style>
</head>
<body>
  <div class="print-actions no-print">
    <button class="btn primary" onclick="window.print()">Print</button>
    <button class="btn secondary" onclick="if(window.parent && window.parent !== window && window.parent.closePrintPreviewModal){ window.parent.closePrintPreviewModal(); } else { window.close(); }">Tutup</button>
  </div>
  <main class="sheet" id="sheet"></main>

<script>
(function(){
  function esc(value){
    return String(value ?? '').replace(/[&<>"']/g, function(ch){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch];
    });
  }
  function tick(show){
    return show ? '<span class="tick">✓</span>' : '';
  }
  function normalizeDateText(payload){
    if(payload && payload.dateText) return String(payload.dateText);
    return 'HARI - TANGGAL';
  }
  function defaultSettings(unitName){
    const unit = unitName || 'Muatan Breeder';
    return {
      signBip:'B I P',
      signGudang:'Bagian Gudang',
      signKasie:'Kasie ' + unit,
      signPga:'Bagian P&GA',
      note:'',
      workTitle:'JAM KERJA ' + unit.toUpperCase(),
      shiftPagiLabel:'PAGI',
      shiftPagiIn:'07.00',
      shiftPagiOut:'15.00',
      shiftSiangLabel:'SIANG',
      shiftSiangIn:'15.00',
      shiftSiangOut:'23.00'
    };
  }
  function render(){
    const raw = localStorage.getItem('BIP_PRINT_ABSENSI_PAYLOAD');
    const sheet = document.getElementById('sheet');
    if(!raw){
      sheet.innerHTML = '<div class="empty-message">Data laporan print belum tersedia. Kembali ke aplikasi lalu klik tombol Print lagi.</div>';
      return;
    }

    let payload;
    try{ payload = JSON.parse(raw); }catch(err){ payload = null; }
    if(!payload || !Array.isArray(payload.rows) || !payload.rows.length){
      sheet.innerHTML = '<div class="empty-message">Data laporan print kosong. Kembali ke aplikasi lalu tampilkan data absensi terlebih dahulu.</div>';
      return;
    }

    const settings = Object.assign(defaultSettings(payload.unitName), payload.settings || {});
    const rows = payload.rows;
    const sumS1 = rows.filter(r=>!!r.s1).length;
    const sumS2 = rows.filter(r=>!!r.s2).length;
    const total = rows.length;

    const bodyRows = rows.map((r,idx)=>`
      <tr>
        <td>${idx+1}</td>
        <td>${esc(r.nip)}</td>
        <td class="name">${esc(r.name)}</td>
        <td>${tick(r.s1)}</td>
        <td>${tick(r.s2)}</td>
        <td><span class="check-text">${esc(r.checkIn || '')}</span></td>
        <td><span class="check-text">${esc(r.checkOut || '')}</span></td>
      </tr>
    `).join('');

    sheet.innerHTML = `
      <section class="print-title">
        <div class="main">${esc(payload.title || 'ABSENSI KEGIATAN MUATAN BREEDER')}</div>
        <div class="company">${esc(payload.company || 'PT. BUDI INTI PERKASA')}</div>
        <div class="date">${esc(normalizeDateText(payload))}</div>
      </section>
      <div class="table-wrap">
        <table class="report-table">
          <thead>
            <tr>
              <th>NO</th><th>NIP</th><th>NAMA</th><th>SHIFT 1</th><th>SHIFT 2</th><th>CEK IN</th><th>CEK OUT</th>
            </tr>
          </thead>
          <tbody>${bodyRows}</tbody>
          <tfoot class="report-summary">
            <tr>
              <td class="summary-empty" colspan="3"></td>
              <th>SHIFT 1</th>
              <th>SHIFT 2</th>
              <td class="summary-empty" colspan="2"></td>
            </tr>
            <tr>
              <td class="left-label" colspan="3">JUMLAH PEKERJA</td>
              <td>${sumS1}</td>
              <td>${sumS2}</td>
              <td class="summary-empty" colspan="2"></td>
            </tr>
            <tr>
              <td class="summary-empty" colspan="3"></td>
              <td class="total" colspan="2">${total} Orang</td>
              <td class="summary-empty" colspan="2"></td>
            </tr>
          </tfoot>
        </table>
      </div>
      <section class="report-footer">
        <div class="signature-grid">
          <div><div class="signature-title">${esc(settings.signBip)}</div><div class="signature-line"></div></div>
          <div><div class="signature-title">${esc(settings.signGudang)}</div><div class="signature-line"></div></div>
          <div><div class="signature-title">${esc(settings.signKasie)}</div><div class="signature-line"></div></div>
          <div><div class="signature-title">${esc(settings.signPga)}</div><div class="signature-line"></div></div>
        </div>
        <div class="note-area">
          <div class="note-title">NOTE :</div>
          <div class="note-content">${esc(settings.note)}</div>
          <table class="worktime-table">
            <tr><th colspan="3" class="worktime-main">ABSENSI SIDIK JARI<br><span>${esc(settings.workTitle)}</span></th></tr>
            <tr><th>JADWAL</th><th colspan="2">JAM KERJA</th></tr>
            <tr><th>KERJA</th><th>CEK IN</th><th>CEK OUT</th></tr>
            <tr><td>${esc(settings.shiftPagiLabel)}</td><td>${esc(settings.shiftPagiIn)}</td><td>${esc(settings.shiftPagiOut)}</td></tr>
            <tr><td>${esc(settings.shiftSiangLabel)}</td><td>${esc(settings.shiftSiangIn)}</td><td>${esc(settings.shiftSiangOut)}</td></tr>
          </table>
        </div>
      </section>
    `;

    if(new URLSearchParams(window.location.search).get('autoprint') === '1'){
      setTimeout(function(){ window.print(); }, 250);
    }
  }
  render();
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const modal = document.querySelector('.modal, #modal, .modal-preview');
  if (!modal) return;

  // ESC key close
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      modal.style.display = 'none';
    }
  });

  // click outside modal content
  modal.addEventListener('click', function(e) {
    if (e.target === modal) {
      modal.style.display = 'none';
    }
  });
});
</script>

</body>
</html>
